<h2 id="asstring">AsString</h2>
<p>The <code>renderNode</code> function in the <code>Builder</code> module is a cancellable value task that utilizes a work-item stack for iterative rendering.</p>
<pre><code class="language-fsharp">let renderNode node (ct: CancellationToken) = valueTask {
    let sb = StringBuilder(4096)
    let stack = Stack&lt;WorkItem&gt;(64)
    stack.Push(RenderNode node)

    while stack.Count &gt; 0 do
      ct.ThrowIfCancellationRequested()
      let work = stack.Pop()

      match work with
      | RenderNode n -&gt;
        // rendering logic
        match n with
        // ...
      | CloseElement tag -&gt; // ...
      // ...
    return sb.ToString()
}
</code></pre>
<p>It keeps a stack of <code>WorkItem</code>s (such as <code>RenderNode</code>, <code>CloseElement</code>, <code>RenderChildrenPrefetched</code>) to manage the rendering process iteratively.</p>
<p>Our rendering algorithm not really optimized for speed or anything but contributions are welcome.</p>
<p>Considerations when you use this approach is that you will have to keep the string in memory before sending it to the client. While I don't expect you to send a 1GB HTML file, it's still something to keep in mind.</p>
<p>This approach works best for small to medium sized documents but leaves HTML streaming (a browser feature) out of the window that improves certain metrics like time to first byte and time to first meaningful paint. If that is not a concern, meaning that you may not be in a web server environment, this approach is perfectly fine.</p>
<h2 id="iasyncenumerablestring"><code>IAsyncEnumerable&lt;string&gt;</code></h2>
<p>The second approach is to use an <code>IAsyncEnumerable&lt;string&gt;</code> sequence and it is meant to be used where sending the HTML content to a consumer is the most important thing. This can be hooked up easily with <code>System.IO.Stream</code> objects and the like.</p>
<p>The <code>Chunked.renderNode</code> function also uses a stack-based iterative approach similar to the string builder method, but yields strings asynchronously:</p>
<pre><code class="language-fsharp">  let renderNode(node: Node, ct: CancellationToken) : IAsyncEnumerable&lt;string&gt; = taskSeq {
    let stack = Stack&lt;WorkItem&gt;(64)
    stack.Push(RenderNode node)

    while stack.Count &gt; 0 do
      ct.ThrowIfCancellationRequested()
      let work = stack.Pop()

      match work with
      | RenderNode n -&gt;
        // rendering logic
        match n with
        // ...
      | CloseElement tag -&gt; // ...
      // ...
  }
</code></pre>
<p>This implementation handles attribute encoding and tag rendering in fine-grained chunks.</p>
<p>You can see the full implementation of this in the <code>Rendering.Chunked</code> module.</p>
<h2 id="render-class">Render class</h2>
<p>The render class is the public face of the rendering inner mechanisms described above. It's a thin wrapper around the <code>renderNode</code> function and it looks as follows:</p>
<pre><code class="language-fsharp">
[&lt;Class&gt;]
type Render =
  [&lt;CompiledName &quot;Start&quot;&gt;]
  static member start:
    node: Node * [&lt;OptionalAttribute&gt;] ?cancellationToken: CancellationToken -&gt;
      string IAsyncEnumerable

  [&lt;CompiledName &quot;ToStream&quot;&gt;]
  static member toStream:
    node: Node *
    stream: System.IO.Stream *
    [&lt;OptionalAttribute; Struct&gt;] ?chunkSize: int *
    [&lt;OptionalAttribute&gt;] ?cancellationToken: CancellationToken -&gt;
      Task

  [&lt;CompiledName &quot;AsString&quot;&gt;]
  static member asString:
    node: Node * [&lt;OptionalAttribute&gt;] ?cancellationToken: CancellationToken -&gt;
      string ValueTask

  static member asStringAsync: node: Node -&gt; string Async
</code></pre>
<p>From these methods, <code>ToStream</code> is worth sharing as it is kind of the built-in streaming mechanism. It looks as follows:</p>
<pre><code class="language-fsharp">  [&lt;CompiledName &quot;ToStream&quot;&gt;]
  static member toStream
    (
      node: Node,
      stream: IO.Stream,
      [&lt;OptionalAttribute; Struct&gt;] ?chunkSize: int,
      [&lt;OptionalAttribute&gt;] ?cancellationToken:
        CancellationToken
    ) =
    taskUnit {
      let ct =
        defaultArg cancellationToken CancellationToken.None

      use writer =
        new StreamWriter(stream, Text.Encoding.UTF8, 4092, leaveOpen = true)

      let chunkSize =
        match chunkSize with
        | ValueSome n when n &gt; 0 -&gt; ValueSome n
        | _ -&gt; ValueNone
      
      // ... implementation handling buffering based on chunkSize ...
    }
</code></pre>
<p>Our <code>toStream</code> implementation allows for optional buffering.</p>
<blockquote>
<p><strong><em>Note</em></strong>: The <code>chunkSize</code> parameter allows you to specify a buffer size in characters. If provided, the renderer will accumulate chunks into a buffer of this size before writing to the stream and flushing. This can significantly improve performance by reducing the number of I/O operations and flushing overhead.</p>
</blockquote>
<p>The main reason I share this is to show you that the building blocks are there and you can take it really far if that's what you need.</p>
